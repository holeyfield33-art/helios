name: Publish to PyPI

'on':
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/helios-core/
    steps:
      - name: Download dist artifacts from GitHub Release
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "*.whl" \
            --pattern "helios_core-*.tar.gz" \
            --dir dist/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
