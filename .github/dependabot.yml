version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "holeyfield33-art"
    labels:
      - "dependencies"
      - "go"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    assignees:
      - "holeyfield33-art"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "pip"
    directory: "/implementations/python"
    schedule:
      interval: "weekly"
    assignees:
      - "holeyfield33-art"
    labels:
      - "dependencies"
      - "python"
